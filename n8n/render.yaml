services:
  - type: web
    name: n8n
    runtime: docker
    repo: https://github.com/n8n-io/n8n
    plan: free
    envVars:
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_HOST
        value: n8n.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: DB_TYPE
        value: sqlite
